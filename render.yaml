databases:
  - name: booknest-db
    databaseName: booknest
    user: booknest
    plan: free
    region: singapore
    postgresMajorVersion: "17"

services:
  - type: web
    name: booknest-api
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DATABASE_URL
        fromDatabase:
          name: booknest-db
          property: connectionString
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: SESSION_HOURS
        value: 168
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_USER_PASSWORD
        sync: false
