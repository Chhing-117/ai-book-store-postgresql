services:
  postgres:
    image: postgres:17-alpine
    container_name: booknest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: booknest
      POSTGRES_USER: booknest
      POSTGRES_PASSWORD: booknest
    ports:
      - "5432:5432"
    volumes:
      - booknest_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booknest -d booknest"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  booknest_postgres_data:
